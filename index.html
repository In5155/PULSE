<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Messaging App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════ Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <h2>Welcome Back</h2>

      <div id="auth-error" class="error-msg"></div>

      <input type="email"     id="email"    placeholder="Email Address" />
      <input type="password"  id="password" placeholder="Password" />

      <div class="auth-buttons">
        <button id="login-btn"  class="primary-btn">Sign In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
      </div>

      <div class="divider"><span>OR</span></div>

      <button id="google-btn" class="google-btn">
        <!-- Google G logo -->
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ Chat Screen -->
  <div id="chat-screen" class="screen hidden">

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- Profile / Username -->
      <div class="profile-section">
        <h3>Your Identity</h3>
        <div class="code-display">
          <span id="user-code">----</span>
          <button id="edit-code-btn" title="Edit Username">✎</button>
        </div>

        <div id="edit-code-area" class="hidden">
          <input type="text" id="new-code-input" placeholder="New Username" />
          <div class="edit-code-actions">
            <button id="save-code-btn"   class="small-btn">Save</button>
            <button id="cancel-code-btn" class="small-btn secondary-btn">Cancel</button>
          </div>
          <div id="code-error" class="error-msg"></div>
        </div>

        <button id="logout-btn" class="logout-btn">Sign Out</button>
      </div>

      <!-- Add Contact -->
      <div class="add-contact-section">
        <h3>Add Contact</h3>
        <div class="add-contact-controls">
          <input type="text" id="add-contact-input" placeholder="User's username" />
          <button id="add-contact-btn" class="small-btn">Add</button>
        </div>
        <div id="contact-error" class="error-msg"></div>
      </div>

      <!-- Contacts List -->
      <div class="contacts-section">
        <h3>Contacts</h3>
        <div id="contacts-list"></div>
      </div>

    </aside>

    <!-- Main Chat Area -->
    <main class="chat-container">

      <!-- Empty state when no conversation is selected -->
      <div id="no-chat-selected" class="empty-state">
        <p>Select a contact to start messaging</p>
      </div>

      <!-- Active conversation -->
      <div id="active-chat-window" class="hidden">

        <header class="chat-header">
          <h3 id="chat-with-header">Chat</h3>
        </header>

        <div id="messages" class="messages"></div>

        <!-- Typing indicator sits between message list and input bar -->
        <div id="typing-indicator" class="typing-indicator hidden"></div>

        <div class="input-area">
          <input
            type="text"
            id="message-input"
            placeholder="Type a message…"
            autocomplete="off"
          />
          <button id="send-btn" class="primary-btn">Send</button>
        </div>

      </div>

    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
